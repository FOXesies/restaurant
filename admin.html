<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления — Belka Vilka</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body auth-locked"> 
    <div id="adminAuthModal" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-logo">✦ Belka Vilka ✦</div>
            <h2>Вход в панель управления</h2>
            
            <form id="adminLoginForm" autocomplete="off">
                <div class="auth-group">
                    <label for="authLogin">Логин</label>
                    <input type="text" id="authLogin" required placeholder="Введите логин">
                </div>
                
                <div class="auth-group">
                    <label for="authPassword">Пароль</label>
                    <input type="password" id="authPassword" required placeholder="Введите пароль">
                </div>
                
                <button type="submit" class="auth-submit-btn">Войти</button>
            </form>
        </div>
    </div>

    <h1>Панель управления Belka Vilka</h1>
    
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('menu-tab')">🍔 Управление меню</button>
        <button class="tab-btn" onclick="switchTab('reservations-tab')">📅 Заявки на бронь</button>
        <button class="tab-btn" onclick="switchTab('promotions-tab')">🎁 Специальные предложения</button>
    </div>

    <div id="menu-tab" class="tab-content active">
        <div class="form-header">
            <h2 id="formTitle">Добавить новое блюдо</h2>
            <button type="button" id="createNewBtn" style="display: none;">+ Создать новую позицию</button>
        </div>
        
        <form id="addDishForm" enctype="multipart/form-data">
            <input type="hidden" name="id" id="dishIdInput">

            <div class="form-group">
                <label>Категория</label>
                <select name="category" required>
                    <option value="starters">Закуски (starters)</option>
                    <option value="salads">Салаты (salads)</option>
                    <option value="mains">Горячее (mains)</option>
                    <option value="desserts">Десерты (desserts)</option>
                    <option value="drinks">Напитки (drinks)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Название</label>
                <input type="text" name="name" id="dishNameInput" required maxlength="50" placeholder="Например, Салат Цезарь">
                <small id="charCounter" class="hint-text">0 / 50 symbols</small>
            </div>

            <div class="form-group">
                <label>Цена</label>
                <div class="postfix-wrapper" data-postfix="₽">
                    <input type="number" name="price" required min="1" placeholder="550">
                </div>
            </div>

            <div class="form-group">
                <label>Вес</label>
                <div class="postfix-wrapper" data-postfix="г">
                    <input type="number" name="weight" required min="1" placeholder="180">
                </div>
            </div>

            <div class="form-group">
                <label>Калории</label>
                <div class="postfix-wrapper" data-postfix="ккал">
                    <input type="number" name="calories" required min="0" placeholder="290">
                </div>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea name="desc" rows="3" required placeholder="Опишите состав..."></textarea>
            </div>
            
            <div class="form-group">
                <label id="mainImgLabel">Главное превью (1 photo)</label>
                <div id="mainPhotoManager" class="media-manager-zone" style="display: none;"></div>
                <input type="file" name="img" accept="image/*" required>
            </div>

            <div class="form-group">
                <label>Галерея для слайдера (всего до 4-х фото)</label>
                <div id="galleryManager" class="media-manager-zone" style="display: none;"></div>
                <input type="file" name="gallery" accept="image/*" multiple>
                <small class="hint-text">Выбранные файлы добавятся к тем, что остались в блоке выше.</small>
            </div>
            
            <div class="btn-container">
                <button type="submit" id="submitBtn">Сохранить блюдо в меню</button>
                <button type="button" id="cancelEditBtn" style="display: none;">Отмена</button>
            </div>
        </form>

        <h2>Текущее меню</h2>
        <div class="dish-list" id="adminMenuContainer"></div>
    </div>

    <div id="reservations-tab" class="tab-content">
        <h2>Список заявок на бронирование</h2>
        
        <div class="filters-panel">
            <div class="filter-group">
                <label>Статус</label>
                <select id="filterStatus" onchange="applyReservationsFilters()">
                    <option value="all">🌍 Все статусы</option>
                    <option value="ожидает ответа">⏳ Ожидает ответа</option>
                    <option value="завершена">✅ Завершена</option>
                    <option value="отменена">❌ Отменена</option>
                    <option value="просрочена">💀 Просрочена</option>
                </select>
            </div>

            <div class="filter-group">
                <label>Дата брони</label>
                <div class="date-filter-inline">
                    <input type="date" id="filterDate" onchange="applyReservationsFilters()">
                    <button type="button" class="clear-date-btn" onclick="clearFilterDate()" title="Сбросить дату">✕</button>
                </div>
            </div>

            <div class="filter-group">
                <label>Время заказа</label>
                <select id="filterSort" onchange="applyReservationsFilters()">
                    <option value="desc">⬇️ Сначала новые (по убыванию)</option>
                    <option value="asc">⬆️ Сначала старые (по возрастанию)</option>
                </select>
            </div>
        </div>

        <div class="res-list" id="adminReservationsContainer"></div>
    </div>

    <div id="promotions-tab" class="tab-content">
        <div class="admin-grid">
            
            <div class="form-container">
                <h2 id="promoFormTitle">Добавить новую акцию</h2>
                
                <form id="addPromoForm">
                    <input type="hidden" id="promoIdInput" value="">
                    
                    <div class="form-group">
                        <label>Верхний тег / Условие (например: КАЖДЫЙ ПОНЕДЕЛЬНИК)</label>
                        <input type="text" id="promoBadgeInput" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Название акции</label>
                        <input type="text" id="promoTitleInput" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Описание акции</label>
                        <textarea id="promoDescInput" required rows="4"></textarea>
                    </div>
                    
                    <div class="btn-container">
                        <button type="submit" id="promoSubmitBtn">Сохранить акцию</button>
                        <button type="button" id="cancelPromoEditBtn" style="display: none;">Отмена</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <h2>Текущие акции на сайте</h2>
                <div id="adminPromotionsContainer"></div>
            </div>

        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
